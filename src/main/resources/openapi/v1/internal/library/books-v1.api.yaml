get:
  summary: "Get Books V1"
  description: "Get all books, optionally filtered by search criteria"
  operationId: "GetBooksV1"
  tags:
    - get-books-v1
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '../requests/GetBooksV1Request.yaml'
  responses:
    '200':
      description: "200 OK"
      content:
        application/json:
          schema:
            $ref: '../responses/GetBooksV1Response.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
post:
  summary: "Post Book V1"
  description: "Create a new book"
  operationId: "PostBookV1"
  tags:
    - post-book-v1
  parameters:
    - name: X-Requester-Id
      in: header
      required: true
      schema:
        type: integer
        format: int32
      description: "Identifier of the user performing the action"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../requests/PostBookV1Request.yaml'
  responses:
    '201':
      description: "201 Created"
      content:
        application/json:
          schema:
            $ref: '../responses/BookV1Response.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
