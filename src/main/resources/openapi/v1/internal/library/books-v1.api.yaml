get:
  summary: "Get Books V1"
  description: "Get all books, optionally filtered by search criteria"
  operationId: "GetBooksV1"
  tags:
    - get-books-v1
  parameters:
    - name: isbn
      in: query
      required: false
      schema:
        type: string
      description: "Filter by ISBN"
    - name: title
      in: query
      required: false
      schema:
        type: string
      description: "Filter by title (partial match)"
    - name: author
      in: query
      required: false
      schema:
        type: string
      description: "Filter by author (partial match)"
    - name: genre
      in: query
      required: false
      schema:
        type: string
      description: "Filter by genre (partial match)"
  responses:
    '200':
      description: "200 OK"
      content:
        application/json:
          schema:
            $ref: '../responses/GetBooksV1Response.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
post:
  summary: "Post Book V1"
  description: "Create a new book"
  operationId: "PostBookV1"
  tags:
    - post-book-v1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../requests/PostBookV1Request.yaml'
  responses:
    '201':
      description: "201 Created"
      content:
        application/json:
          schema:
            $ref: '../responses/BookV1Response.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
