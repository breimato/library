get:
  summary: "Get User By Id V1"
  description: "Get User By Id V1"
  operationId: "GetUserIdV1"
  tags:
    - get-user-id-v1
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
      description: "User identifier"
  responses:
    '200':
      description: "200 OK"
      content:
        application/json:
          schema:
            $ref: '../responses/UserV1Response.yaml'
    '404':
      description: "Not Found - User not found"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
patch:
  summary: "Patch User V1"
  description: "Partially update a user"
  operationId: "PatchUserV1"
  tags:
    - patch-user-v1
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
      description: "User identifier"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../requests/PatchUserV1Request.yaml'
  responses:
    '200':
      description: "200 OK"
      content:
        application/json:
          schema:
            $ref: '../responses/UserV1Response.yaml'
    '404':
      description: "Not Found - User not found"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
delete:
  summary: "Delete User V1"
  description: "Delete a user"
  operationId: "DeleteUserV1"
  tags:
    - delete-user-v1
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
      description: "User identifier"
  responses:
    '204':
      description: "204 No Content"
    '404':
      description: "Not Found - User not found"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
