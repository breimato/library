get:
  summary: "Get Users V1"
  description: "Get all users"
  operationId: "GetUsersV1"
  tags:
    - get-users-v1
  parameters:
    - name: name
      in: query
      required: false
      schema:
        type: string
    - name: email
      in: query
      required: false
      schema:
        type: string
    - name: status
      in: query
      required: false
      schema:
        type: integer
  responses:
    '200':
      description: "200 OK"
      content:
        application/json:
          schema:
            $ref: '../responses/GetUsersV1Response.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
post:
  summary: "Create User V1"
  description: "Create User V1"
  operationId: "PostUserV1"
  tags:
    - post-user-v1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../requests/PostUserV1Request.yaml'
  responses:
    '201':
      description: "201 Created"
      content:
        application/json:
          schema:
            $ref: '../responses/UserV1Response.yaml'
    '409':
      description: "Conflict - User email already exists"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
