patch:
  summary: "Patch Loan Return V1"
  description: "Return a loan"
  operationId: "PatchLoanReturnV1"
  tags:
    - patch-loan-return-v1
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
      description: "Loan identifier"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../requests/PatchLoanReturnV1Request.yaml'
  responses:
    '200':
      description: "200 OK"
      content:
        application/json:
          schema:
            $ref: '../responses/LoanV1Response.yaml'
    '404':
      description: "Not Found - Loan not found"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
