get:
  summary: "Get User Reservations V1"
  description: "Get all reservations for a specific user. Requester must be the user themselves or a manager/admin."
  operationId: "GetUserReservationsV1"
  tags:
    - get-user-reservations-v1
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
      description: "User identifier"
    - name: X-Requester-Id
      in: header
      required: true
      schema:
        type: integer
        format: int32
      description: "Identifier of the user performing the action"
  responses:
    '200':
      description: "200 OK"
      content:
        application/json:
          schema:
            $ref: '../responses/GetReservationsV1Response.yaml'
    '403':
      description: "Forbidden - Cannot access another user's reservations"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
    '404':
      description: "Not Found - User not found"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
    '500':
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: '../components/ApiErrorV1.yaml'
