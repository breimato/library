openapi: 3.0.3
info:
  title: es-library-api
  version: 1.0.0
  description: Library service API

paths:
  # Books
  /v1/library/books:
    $ref: './library/books-v1.api.yaml'
  /v1/library/books/{id}:
    $ref: './library/books-id-v1.api.yaml'
  # Users
  /v1/library/users:
    $ref: './library/users-v1.api.yaml'
  /v1/library/users/{id}:
    $ref: './library/users-id-v1.api.yaml'
  # Loans
  /v1/library/loans:
    $ref: './library/loans-v1.api.yaml'
  /v1/library/loans/{id}:
    $ref: './library/loans-id-v1.api.yaml'
  /v1/library/users/{id}/loans:
    $ref: './library/users-id-loans-v1.api.yaml'
  /v1/library/loans/{id}/return:
    $ref: './library/loans-id-return-v1.api.yaml'
  /v1/library/loans/{id}/renew:
    $ref: './library/loans-id-renew-v1.api.yaml'
  # Fines
  /v1/library/fines:
    $ref: './library/fines-v1.api.yaml'
  /v1/library/fines/{id}:
    $ref: './library/fines-id-v1.api.yaml'
  /v1/library/users/{id}/fines:
    $ref: './library/users-id-fines-v1.api.yaml'
  # Reservations
  /v1/library/reservations:
    $ref: './library/reservations-v1.api.yaml'
  /v1/library/reservations/{id}:
    $ref: './library/reservations-id-v1.api.yaml'
  /v1/library/users/{id}/reservations:
    $ref: './library/users-id-reservations-v1.api.yaml'
  # Loan Requests
  /v1/library/loan-requests:
    $ref: './library/loan-requests-v1.api.yaml'
  /v1/library/loan-requests/{id}:
    $ref: './library/loan-requests-id-v1.api.yaml'

components:
  schemas:
    ApiError:
      $ref: './components/ApiErrorV1.yaml'
    BookV1:
      $ref: './components/BookV1.yaml'
    UserV1:
      $ref: './components/UserV1.yaml'
    LoanV1:
      $ref: './components/LoanV1.yaml'
    FineV1:
      $ref: './components/FineV1.yaml'
    ReservationV1:
      $ref: './components/ReservationV1.yaml'
    PostBookV1Request:
      $ref: './requests/PostBookV1Request.yaml'
    PatchBookV1Request:
      $ref: './requests/PatchBookV1Request.yaml'
    PostUserV1Request:
      $ref: './requests/PostUserV1Request.yaml'
    PatchUserV1Request:
      $ref: './requests/PatchUserV1Request.yaml'
    LoanRequestV1:
      $ref: './components/LoanRequestV1.yaml'
    PostLoanRequestV1Request:
      $ref: './requests/PostLoanRequestV1Request.yaml'
    PatchLoanRequestV1Request:
      $ref: './requests/PatchLoanRequestV1Request.yaml'
    GetLoanRequestsV1Request:
      $ref: './requests/GetLoanRequestsV1Request.yaml'
    PostLoanV1Request:
      $ref: './requests/PostLoanV1Request.yaml'
    PatchLoanReturnV1Request:
      $ref: './requests/PatchLoanReturnV1Request.yaml'
    PatchLoanRenewV1Request:
      $ref: './requests/PatchLoanRenewV1Request.yaml'

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
